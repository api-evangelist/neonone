  endpointsModeled:
    - description: Volunteer Groups and Roles endpoints (GET/PUT/DELETE
        /groups/{id}, POST /groups, POST /groups/{id}/addVolunteers, GET
        /groups/{id}/volunteers, GET /groups/list, DELETE
        /groups/{id}/removeVolunteers, POST /roles, GET /roles/list, GET/PUT/DELETE
        /roles/{id}, GET /roles/{id}/volunteers) were confirmed in the
        November 2024 API v2.9 update notes but were not included in the
        OpenAPI document to keep it a representative subset; they are
        real, documented endpoints.
    - description: Custom Object Form Layouts, List Layouts, Relations, and
        Validators sub-resources (e.g. GET/PUT/DELETE
        /customObjects/{apiAlias}/formLayouts/{id}) were confirmed in the
        April 2025 API v2.10 update notes but modeled only at a
        representative level in the OpenAPI document.
    - description: Full Properties/reference-data lookup surface
        (/properties/individualTypes, companyTypes, addressTypes, genders,
        prefixes, sources, relationTypes, activityStatuses, eventCategories,
        eventTopics, systemTimezones) was confirmed via the rate-limits page
        but only a representative sample (funds, purposes, solicitationMethods,
        countries, states) was modeled in the OpenAPI document.
sources:
  - url: https://developer.neoncrm.com/authentication/
    type: Documentation
    note: Confirms HTTP Basic Auth (Org ID + API key) for API v2; no OAuth
      support for system users; base URL https://api.neoncrm.com/v2.
  - url: https://developer.neoncrm.com/api-v2-resources/rate-limits/
    type: Documentation
    note: Raw page enumerates the full v2 endpoint surface used for rate
      limiting - the single most complete public list of real v2 REST
      paths, all HTTPS request/response, none WebSocket.
  - url: https://developer.neoncrm.com/api-v2-resources/permissions/
    type: Documentation
    note: Confirms Accounts, Donations, Pledges, Recurring, Campaigns,
      Events, Event Registration, Properties, and Webhooks as
      permission-gated v2 resource categories.
  - url: https://developer.neoncrm.com/api-v2-resources/response-codes/
    type: Documentation
    note: Documents 200/201/204/222/401/403/404/429 response codes for v2;
      429 is the rate-limit response, not a WebSocket handshake code.
  - url: https://developer.neoncrm.com/webhooks/
    type: Documentation
    note: Explicitly describes webhooks as HTTP POST notifications (JSON or
      form-encoded) with 3x retry at 2-second intervals - one-directional
      server-to-endpoint HTTP, not WebSocket.
  - url: https://developer.neoncrm.com/2025/06/09/api-v2-10-update-households/
    type: Documentation
    note: Confirms exact Households endpoints shipped June 7, 2025.
  - url: https://developer.neoncrm.com/2025/04/14/api-v2-10-update-custom-objects/
    type: Documentation
    note: Confirms exact Custom Objects endpoints shipped April 12, 2025.
  - url: https://developer.neoncrm.com/2024/11/22/api-v2-9-updates-november-2024/
    type: Documentation
    note: Confirms exact Volunteers, Groups, Opportunities, Roles, Shifts,
      and Time Sheets endpoints shipped November 16, 2024.
  - url: https://developer.neoncrm.com/2025/10/24/api-v2-11-release-notes/
    type: Documentation
    note: Confirms the /accounts/{id}/memberships isActive and
      primaryActiveMembership fields and the opportunityRoles parameter on
      /addVolunteers, both API v2.11 (October 18, 2025).
  - url: https://developer.neoncrm.com/2026/05/05/neon-crm-api-v1-legacy-webhooks-will-be-deprecated-july-11th-2026/
    type: Documentation
    note: Announces API v1 and legacy webhook sunset on July 11, 2026 - 8
      days after this review date. Does not affect API v2.
  - url: https://developer.neoncrm.com/api-v2-resources/versions/
    type: Documentation
    note: Lists API v2 versions 2.0 (May 2020) through 2.11 (October 2025),
      all currently valid.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists on Neon One's public API. Neon CRM
    API v2 is synchronous REST, and its only server-initiated notification
    channel - webhooks - is one-directional HTTP POST with sender-side retry,
    not a persistent bidirectional connection. No AsyncAPI document was
    created because there is no server-push transport (WebSocket or SSE) to
    model; the webhook payload shape is already fully described inline in
    the Webhooks API section of openapi/neonone-openapi.yml.
