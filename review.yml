aid: neonone
name: Neon One
review:
  question: Does Neon One expose a documented public WebSocket API?
  answer: false
  date: '2026-07-03'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Neon CRM's own public API surface -
    both the REST API v2 and the outbound webhook mechanism - is one-directional
    HTTP: REST request/response for API calls, and server-initiated HTTP POST
    (with client-side retry expected on the receiver, and up to 3 sender-side
    retries on failure) for webhooks. There is no bidirectional, persistent-
    connection transport (WebSocket or SSE) documented anywhere in Neon's
    developer center to model as AsyncAPI.
findings:
  summary: |
    Neon One does not publish a documented public WebSocket API. Neon CRM API
    v2 is a synchronous REST API over HTTPS at https://api.neoncrm.com/v2
    (https://trial.z2systems.com/v2 for trial instances), authenticated with
    HTTP Basic Auth (Org ID as username, API key as password). Real-time
    notification is handled entirely through outbound webhooks: Neon CRM POSTs
    a JSON (or form-encoded) payload to a developer-configured URL when an
    Accounts, Donations, Memberships, Event Registrations, Orders, or
    Activities record is created, updated, or deleted. This is standard
    server-to-endpoint HTTP delivery, not a WebSocket. Failed webhook
    deliveries are retried up to 3 times at 2-second intervals; there is no
    persistent connection, no ws:// or wss:// scheme, and no mention of
    WebSocket anywhere in the API v2 reference, resources pages, or the
    dedicated webhooks documentation.
  timeSensitiveNote: |
    Neon One announced on May 5, 2026 that API v1 and the legacy webhook
    structure will be retired on July 11, 2026 - 8 days from this review date.
    Any remaining v1 integrations or legacy-format webhooks must migrate to
    API v2 and the newer Event Trigger format before that date. This review
    covers API v2 only, which is unaffected by the sunset and is not
    time-limited.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.neoncrm.com/v2
      documented: true
      note: Synchronous JSON request/response API. HTTP Basic Auth with Org ID
        and API key. Concurrency-based rate limits (5 simultaneous requests
        per endpoint; 1 for the four search endpoints), not time-window based.
    - protocol: Webhook
      scheme: https
      documented: true
      note: Server-initiated HTTP POST (JSON or form-encoded) to a developer
        URL on create/update/delete of Accounts, Donations, Memberships,
        Event Registrations, Orders, and Activities. Retried up to 3 times at
        2-second intervals on failure. Managed via UI or the Webhooks API
        (GET/POST /webhooks, GET/PUT/PATCH/DELETE /webhooks/{id}).
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint, ws:// or wss:// scheme, or persistent
        bidirectional connection is documented anywhere in Neon CRM's API v2
        reference, API v2 Resources pages, or webhooks documentation as of
        the review date.
