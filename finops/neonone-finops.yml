description: >-
  FinOps view of Neon One spend. Neon CRM is billed as a per-organization
  software subscription (Essentials/Impact/Empower) priced against the
  nonprofit's annual revenue, with optional Memberships, Volunteers, and
  Events add-on modules each billed as a percentage surcharge on the base
  subscription. The Neon CRM API v2 and its webhooks are bundled into every
  subscription tier at no separate metered charge - API usage itself does not
  generate incremental Neon invoice line items. Payment processing (donations,
  memberships, store orders processed through Neon's integrated payment
  gateway) is billed separately as processing fees on transaction volume, not
  covered by this document.
notes: >-
  Exact revenue-tier thresholds are not published; verify current pricing with
  a Neon One sales representative. This document covers CRM subscription and
  add-on module spend only, not third-party payment processor fees.
