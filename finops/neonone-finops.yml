meters:
- name: base_subscription
  description: Monthly Essentials/Impact/Empower subscription fee, scaled to
    the organization's annual revenue tier.
  unit: months
  aggregation: sum
  dimensions:
  - organization
  - plan_tier
- name: addon_module_surcharge
  description: Percentage surcharge on the base subscription for the
    Memberships (+10%), Volunteers (+10%), or Events (+20%) add-on modules.
  unit: percent
  aggregation: sum
  dimensions:
  - organization
  - module
- name: api_usage
  description: Neon CRM API v2 requests and webhook deliveries - included in
    subscription, not separately metered or billed.
  unit: requests
  aggregation: sum
  dimensions:
  - organization
  - endpoint
principles:
- name: Visibility
  description: Track which add-on modules (Memberships, Volunteers, Events)
    are active per organization, since each adds a recurring percentage
    surcharge rather than a flat fee.
- name: Allocation
  description: Map the single Neon CRM subscription to the development,
    fundraising, membership, and events teams that consume it, since one
    invoice covers all API-driven integrations.
- name: Optimization
  description: Right-size the plan tier to actual annual revenue at renewal,
    and disable unused add-on modules to avoid paying their percentage
    surcharge.
- name: Accountability
  description: Assign a subscription owner to review the annual revenue-tier
    true-up and add-on module usage before each contract renewal.
