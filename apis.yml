aid: neonone
url: https://raw.githubusercontent.com/api-evangelist/neonone/refs/heads/main/apis.yml
name: Neon One
kind: company
description: Neon One is a nonprofit technology company whose flagship product,
  Neon CRM, is a donor management and fundraising platform used by nonprofits and
  membership associations to manage constituents, donations, memberships, events,
  campaigns, and volunteers. Neon CRM API v2 is a RESTful, JSON-based rebuild of
  the legacy v1 API, authenticated with HTTP Basic Auth (org ID + API key) against
  a base URL of https://api.neoncrm.com/v2. Neon has scheduled the retirement of
  API v1 and its legacy webhook structure for July 11, 2026.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Nonprofit
- CRM
- Fundraising
- Donor Management
- Membership Management
- Events
created: '2026-07-03'
modified: '2026-07-03'
specificationVersion: '0.19'
